services:
  app:
    build:
      context: .
    container_name: transaction_system
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - /app/vendor
    depends_on:
      db:
        condition: service_healthy
    networks:
      - laravel_net

  db:
    image: mysql:8.0
    container_name: transaction_system_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: transaction_system_db
      MYSQL_USER: admin
      MYSQL_PASSWORD: Password@2026!
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - laravel_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    depends_on:
      db:
        condition: service_healthy
    networks:
      - laravel_net

volumes:
  mysql_data:

networks:
  laravel_net: